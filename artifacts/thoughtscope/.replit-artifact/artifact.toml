kind = "web"
previewPath = "/thoughtscope/"
title = "ThoughtScope"
version = "1.0.0"
id = "artifacts/thoughtscope"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/thoughtscope/" ]
localPort = 23950

[services.development]
run = "pnpm --filter @workspace/thoughtscope run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thoughtscope", "run", "build" ]
publicDir = "artifacts/thoughtscope/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23950"
BASE_PATH = "/thoughtscope/"
